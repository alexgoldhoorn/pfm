name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Black (format check)
        run: uv run black --check .
      - name: Ruff (lint)
        run: uv run ruff check portf_manager portf_server
      - name: Flake8 (lint)
        run: uv run flake8 portf_manager portf_server --max-line-length=88 --extend-ignore=E203,W503,E501

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Unit tests
        run: uv run pytest tests/ --ignore=tests/integration --ignore=tests/e2e -q
