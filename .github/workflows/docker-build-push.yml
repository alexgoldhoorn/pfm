name: Docker Build & Push

# Publish images only on version tags (e.g. v1.0.0) or manual dispatch —
# not on every commit. Self-hosted users build locally; this is for releases.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/portfolio-backend
  IMAGE_NAME_WEB: ${{ github.repository }}/portfolio-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web_client
          file: ./web_client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            IMAGE_TAG=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Run tests on backend image
        if: github.event_name == 'pull_request'
        run: |
          # Test the backend image locally on PR
          docker run --rm -d --name test-backend \
            -p 8000:8000 \
            -e PORTF_DATABASE_URL="sqlite:///test.db" \
            -e PORTF_SECRET_KEY="test-secret" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          
          # Wait for container to start
          sleep 15
          
          # Test health endpoint
          curl -f http://localhost:8000/healthz || exit 1
          
          # Clean up
          docker stop test-backend

      - name: Run tests on web image
        if: github.event_name == 'pull_request'
        run: |
          # Test the web image locally on PR
          docker run --rm -d --name test-web \
            -p 80:80 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:${{ github.sha }}
          
          # Wait for container to start
          sleep 10
          
          # Test web server
          curl -f http://localhost/ || exit 1
          
          # Clean up
          docker stop test-web

      - name: Output image digests
        run: |
          echo "Backend image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}@${{ steps.build-backend.outputs.digest }}"
          echo "Web image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}@${{ steps.build-web.outputs.digest }}"
