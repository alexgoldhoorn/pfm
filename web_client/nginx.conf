server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Broker statements (e.g. a full Mintos export) can be several MB.
    client_max_body_size 25m;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/javascript
        application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Images/fonts are immutable — safe to cache for a long time.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # App code (JS/CSS) must revalidate so deploys reach the browser. ETag-based
    # conditional GETs return 304 when unchanged, fresh code when changed —
    # without this the old immutable cache hid every web update.
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # API requests — proxy to the backend container (same docker network).
    # Using a variable for the upstream prevents nginx crashing at startup when
    # the backend hostname isn't yet resolvable (DNS is resolved per-request).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend "portf_backend_dev:8000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 200s;
    }

    # SPA fallback - serve index.html for all other requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
